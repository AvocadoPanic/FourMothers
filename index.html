<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

<body>

<script>
/* ============================================================
   TYPES — with pop culture references in profiles
   ============================================================ */
const TYPES = {
  women: {
    waif: {
      name: 'Waif',
      pairKey: 'frog',
      affect: 'Helplessness',
      traits: 'Passive · permissive · self-depriving · fantasy-prone · fragile',
      profile: "The Waif feels cursed. She refuses the gift, deflects the compliment, apologizes for taking up space, and somehow makes you feel terrible for noticing. Cinderella by the hearth. Fantine on her deathbed. Marilyn Monroe in her own retelling of her childhood. Her dominant feeling is helplessness, and her favorite fantasy is rescue. She chooses men who cannot save her, then suffers audibly that she has not been saved.",
      partnerTitle: "The Frog-Prince",
      partnerProfile: "She marries a man defined by what he cannot give. Depressed, addicted, drifting, or simply absent in the room. They live a shared fantasy that the other will fix everything. It does not work out."
    },
    hermit: {
      name: 'Hermit',
      pairKey: 'huntsman',

/* ============================================================
   PRONOUN RESOLUTION
   Single-pass dispatch — order-independent so {you} can't shadow {youO}.
   ============================================================ */
const PRONOUNS = {
  self: { I: 'I', me: 'me', my: 'my', My: 'My', myself: 'myself',
          am: 'am', was: 'was', youO: 'you', you: 'you',
          your: 'your', Your: 'Your', yourself: 'yourself' },
  proxy: { I: 'They', me: 'them', my: 'their', My: 'Their', myself: 'themselves',
           am: 'are', was: 'were', youO: 'them', you: 'they',
           your: 'their', Your: 'Their', yourself: 'themselves' }
};

function resolvePronouns(text, mode) {
  const table = PRONOUNS[mode] || PRONOUNS.self;
  return text.replace(/\{(\w+)\}/g, (_, key) =>
    Object.prototype.hasOwnProperty.call(table, key) ? table[key] : `{${key}}`
  );
}

const URL_PARAMS = (() => {
  try { return new URLSearchParams(window.location.search); }
  catch (e) { return new URLSearchParams(''); }
})();

const SCORING_MODE = URL_PARAMS.get('mode') === 'rate' ? 'rate' : 'forced';

function decodeShare(b64) {
  if (!b64) return null;
  try {
    const std = b64.replace(/-/g, '+').replace(/_/g, '/');
    const padded = std + '='.repeat((4 - (std.length % 4)) % 4);
    const data = JSON.parse(atob(padded));
    if (!data.q || !data.s) return null;
    return data;
  } catch (e) { return null; }
}

const SHARED_RESULTS = decodeShare(URL_PARAMS.get('share'));

const state = {
  view: 'home',
  mode: 'self',         // 'self' or 'proxy'
  scoringMode: SCORING_MODE,  // 'forced' (default) or 'rate'
  quiz: null,
  qIndex: 0,
  answers: [],          // forced: { optIdx, weights, confidence }; rate: { ratings: { type: 0-3 } }; either: { neutral: true }
  pending: null,        // forced: { optIdx, confidence } | { optIdx: 4, neutral: true }; rate: { ratings: { type: 0-3 } }
  sharedResults: SHARED_RESULTS  // when set, results view renders this encoded payload instead of state.answers
};

if (SHARED_RESULTS) {
  state.quiz = SHARED_RESULTS.q;
  state.mode = SHARED_RESULTS.m || 'self';
  state.scoringMode = SHARED_RESULTS.sm || 'forced';
  state.view = 'results';
}

const CONFIDENCE_LABELS = { 1: 'Loosely', 2: 'Mostly', 3: 'Exactly' };
const NEUTRAL_OPTION_TEXT = "None of these describes {me}.";

const $app = document.getElementById('app');

function render(animate = true) {
  $app.innerHTML = '';
  if (animate) {
    $app.classList.remove('fade-in');
    void $app.offsetWidth;
    $app.classList.add('fade-in');
  }

  if (state.view === 'home') return renderHome();
  if (state.view === 'quiz') return renderQuiz();
  if (state.view === 'results') return renderResults();
}

/* ---------- QUIZ ---------- */
function getQuestions() {
  return state.quiz === 'women' ? Q_WOMEN : Q_MEN;
}

function renderQuiz() {
  if (state.scoringMode === 'rate') return renderQuizRate();
  return renderQuizForced();
}

function renderQuizForced() {
  const questions = getQuestions();
  const total = questions.length;
  const i = state.qIndex;
  const q = questions[i];
  const pct = (i / total) * 100;
  const letters = ['A', 'B', 'C', 'D'];
  const instrumentName = state.quiz === 'women' ? 'The Four Mothers' : 'The Four Fathers';
  const modeTag = state.mode === 'self' ? 'About me' : 'About someone in my life';
  const pending = state.pending;

  const showConfidence = pending && !pending.neutral;
  const confidenceBlock = showConfidence ? `
    <div class="confidence-row">
      <span class="confidence-label">How well does that describe?</span>
      <div class="confidence-chips" role="radiogroup" aria-label="Confidence">
        ${[1, 2, 3].map(level => `
          <button class="conf-chip ${pending.confidence === level ? 'active' : ''}"
                  role="radio"
                  aria-checked="${pending.confidence === level}"
                  onclick="setConfidence(${level})">${CONFIDENCE_LABELS[level]}</button>
        `).join('')}
      </div>
    </div>

  $app.innerHTML = `
    <div class="masthead">
      <span>${instrumentName}</span>
      <span class="center">${modeTag}</span>

function renderQuizRate() {

  const total = questions.length;
  const i = state.qIndex;
  const q = questions[i];

  const letters = ['A', 'B', 'C', 'D'];

          `).join('')}

  }).join('');

function pendingFromAnswer(a) {
  if (!a) return null;
  if (state.scoringMode === 'rate') {
    return { ratings: a.ratings ? Object.assign({}, a.ratings) : {} };
  }
  if (a.neutral) return { optIdx: NEUTRAL_OPT_IDX, neutral: true };
  return { optIdx: a.optIdx, confidence: a.confidence };
}

window.selectOption = function(optIdx) {
  const prevConfidence = state.pending && !state.pending.neutral ? state.pending.confidence : 2;
  state.pending = { optIdx, confidence: prevConfidence };
  render(false);
};

window.selectNeutral = function() {
  state.pending = { optIdx: NEUTRAL_OPT_IDX, neutral: true };
  render(false);
};

window.setConfidence = function(level) {
  if (!state.pending || state.pending.neutral) return;
  state.pending.confidence = level;
  render(false);
};

window.setRating = function(typeKey, value) {
  if (!state.pending) state.pending = { ratings: {} };
  if (!state.pending.ratings) state.pending.ratings = {};
  state.pending.ratings[typeKey] = value;
  render(false);
};

window.confirmAnswer = function() {
  if (state.scoringMode === 'rate') {
    const p = state.pending || { ratings: {} };
    state.answers[state.qIndex] = { ratings: Object.assign({}, p.ratings || {}) };
  } else {
    if (!state.pending) return;
    const p = state.pending;
    if (p.neutral) {
      state.answers[state.qIndex] = { neutral: true };
    } else {
      const q = getQuestions()[state.qIndex];
      state.answers[state.qIndex] = {
        optIdx: p.optIdx,
        weights: q.opts[p.optIdx].w,
        confidence: p.confidence
      };
    }
  }
  state.qIndex++;
  if (state.qIndex >= getQuestions().length) {
    state.view = 'results';
    state.pending = null;
  } else {
    state.pending = pendingFromAnswer(state.answers[state.qIndex]);
  }
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.goBack = function() {
  if (state.qIndex === 0) {
    state.view = 'home';
    state.quiz = null;
    state.qIndex = 0;
    state.answers = [];
    state.pending = null;
  } else {
    state.qIndex--;
    state.pending = pendingFromAnswer(state.answers[state.qIndex]);
  }
  render();
};

/* ---------- SCORING ----------
   Forced mode: each typed option weights one type at base 3, multiplied
   by confidence (Loosely=1, Mostly=2, Exactly=3); neutral answers
   contribute nothing.
   Rate mode: every option carries an independent 0-3 rating; each type's
   total is rating × 3 summed across all questions.
   Both modes report share-of-total so the radar reads the same. */
function computeScores() {
  const keys = TYPE_ORDER[state.quiz];
  const earned = {};
  keys.forEach(k => earned[k] = 0);

  if (state.scoringMode === 'rate') {
    state.answers.forEach(a => {
      if (!a || !a.ratings) return;
      keys.forEach(k => {
        earned[k] += (a.ratings[k] || 0) * 3;
      });
    });
  } else {
    state.answers.forEach(a => {
      if (!a || a.neutral) return;
      const mult = a.confidence || 2;
      Object.keys(a.weights).forEach(k => {
        earned[k] += a.weights[k] * mult;
      });
    });
  }

  const total = keys.reduce((s, k) => s + earned[k], 0) || 1;
  const pct = {};
  keys.forEach(k => {
    pct[k] = Math.round((earned[k] / total) * 100);
  });
  return pct;
}

function countNeutrals() {
  return state.answers.filter(a => a && a.neutral).length;
}

/* Rate mode has no discrete "neutral" — recognition is encoded in the
   ratings themselves. Intensity = mean rating across all rated options;
   below 0.6 (i.e. mostly 0s with a few 1s) means the respondent didn't
   see themselves anywhere. */
function rateIntensity() {
  let total = 0, count = 0;
  state.answers.forEach(a => {
    if (!a || !a.ratings) return;
    Object.values(a.ratings).forEach(v => {
      total += v;
      count += 1;
    });
  });
  return count ? total / count : 0;
}

function classifyResult(neutralCount, totalAnswered) {
  if (state.scoringMode === 'rate') {
    const intensity = rateIntensity();
    if (intensity < 0.6) return 'no-match';
    const scores = computeScores();
    const sorted = Object.values(scores).sort((a, b) => b - a);
    const spread = sorted[0] - sorted[1];
    if (sorted[0] < 35 || spread < 5) return 'tentative';
    return 'clear';
  }
  const pct = totalAnswered ? neutralCount / totalAnswered : 0;
  if (pct >= 0.45) return 'no-match';
  if (pct >= 0.25) return 'tentative';
  return 'clear';
}

/* ---------- CHART (4-axis radar with portraits) ---------- */
function renderChart(scores) {
  const keys = TYPE_ORDER[state.quiz];
  const types = TYPES[state.quiz];
  const n = keys.length;
  const W = 620, H = 620;
  const cx = W / 2;
  const cy = H / 2;
  const R = 150;
  const IMG_R = 30;
  const IMG_DIST = R + 90;   // image center distance from chart center
  const LBL_OFFSET = IMG_R + 22;  // label sits below image

  const summary = keys.map(k => `${types[k].name} ${scores[k]}%`).join(', ');
  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" class="chart-svg" role="img" aria-label="Score distribution across four types: ${summary}"><title>Score distribution</title>`;

  // Defs: circular clip + sepia tint so colour sources blend with the paper palette
  svg += `<defs>
    <clipPath id="circleClip" clipPathUnits="objectBoundingBox"><circle cx="0.5" cy="0.5" r="0.5"/></clipPath>
    <filter id="sepiaTint" color-interpolation-filters="sRGB">
      <feColorMatrix type="matrix" values="0.39 0.77 0.19 0 0  0.35 0.69 0.17 0 0  0.27 0.53 0.13 0 0  0 0 0 0.92 0"/>
    </filter>
  </defs>`;

  // Concentric grid
  for (let lvl = 1; lvl <= 4; lvl++) {
    const r = R * lvl / 4;
    const pts = keys.map((_, i) => {
      const a = (i / n) * Math.PI * 2 - Math.PI / 2;
      return `${(cx + Math.cos(a) * r).toFixed(2)},${(cy + Math.sin(a) * r).toFixed(2)}`;
    }).join(' ');
    svg += `<polygon points="${pts}" fill="none" stroke="#c8bda9" stroke-width="${lvl === 4 ? 1.2 : 0.6}" stroke-dasharray="${lvl < 4 ? '2,3' : 'none'}"/>`;
  }

  // Radial axes
  keys.forEach((_, i) => {
    const a = (i / n) * Math.PI * 2 - Math.PI / 2;
    const x = cx + Math.cos(a) * R;
    const y = cy + Math.sin(a) * R;
    svg += `<line x1="${cx}" y1="${cy}" x2="${x.toFixed(2)}" y2="${y.toFixed(2)}" stroke="#c8bda9" stroke-width="0.6"/>`;
  });

  // Tick labels along top axis
  for (let lvl = 1; lvl <= 3; lvl++) {
    const r = R * lvl / 4;
    svg += `<text x="${cx + 4}" y="${(cy - r + 3).toFixed(2)}" font-family="IBM Plex Mono, monospace" font-size="9" fill="#8a7e72">${lvl * 25}</text>`;
  }

  // Score polygon
  const scorePts = keys.map((k, i) => {
    const a = (i / n) * Math.PI * 2 - Math.PI / 2;
    const r = R * Math.min(1, scores[k] / 100);
    return `${(cx + Math.cos(a) * r).toFixed(2)},${(cy + Math.sin(a) * r).toFixed(2)}`;
  }).join(' ');
  svg += `<polygon points="${scorePts}" fill="rgba(122, 40, 24, 0.18)" stroke="#7a2818" stroke-width="2" stroke-linejoin="round"/>`;

  // Vertex dots
  keys.forEach((k, i) => {
    const a = (i / n) * Math.PI * 2 - Math.PI / 2;
    const r = R * Math.min(1, scores[k] / 100);
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    svg += `<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="4" fill="#7a2818" stroke="#fbf6ec" stroke-width="2"/>`;
  });

  // Percentage labels inside near each vertex
  keys.forEach((k, i) => {
    const a = (i / n) * Math.PI * 2 - Math.PI / 2;
    const lr = R * 0.6;
    const lx = cx + Math.cos(a) * lr;
    const ly = cy + Math.sin(a) * lr;
    svg += `<text x="${lx.toFixed(2)}" y="${(ly+5).toFixed(2)}" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="14" font-weight="500" fill="#1d1a16">${scores[k]}%</text>`;
  });

  // Portraits + name caption per vertex
  keys.forEach((k, i) => {
    const a = (i / n) * Math.PI * 2 - Math.PI / 2;
    const ix = cx + Math.cos(a) * IMG_DIST;
    const iy = cy + Math.sin(a) * IMG_DIST;
    const isWinner = scores[k] === Math.max(...keys.map(kk => scores[kk]));
    const ringStroke = isWinner ? 2.2 : 1.2;
    // Paper-coloured backing so PNG transparency / sepia blend cleanly
    svg += `<circle cx="${ix.toFixed(2)}" cy="${iy.toFixed(2)}" r="${IMG_R + 2}" fill="#fbf6ec"/>`;
    svg += `<image href="img/${k}.jpg" x="${(ix - IMG_R).toFixed(2)}" y="${(iy - IMG_R).toFixed(2)}" width="${IMG_R * 2}" height="${IMG_R * 2}" preserveAspectRatio="xMidYMid slice" clip-path="url(#circleClip)" filter="url(#sepiaTint)"/>`;
    svg += `<circle cx="${ix.toFixed(2)}" cy="${iy.toFixed(2)}" r="${IMG_R}" fill="none" stroke="#7a2818" stroke-width="${ringStroke}"/>`;
    // Name caption below
    const lx = ix;
    const ly = iy + LBL_OFFSET;
    svg += `<text x="${lx.toFixed(2)}" y="${ly.toFixed(2)}" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="20" font-weight="600" fill="#1d1a16">${types[k].name}</text>`;
  });

  svg += '</svg>';
  return svg;
}

/* ---------- RESULTS ---------- */
function renderResults() {
  const isShared = !!state.sharedResults;
  const scores = isShared ? state.sharedResults.s : computeScores();
  const keys = TYPE_ORDER[state.quiz];
  const types = TYPES[state.quiz];
  const totalAnswered = isShared ? (state.sharedResults.t || 0) : state.answers.length;
  const neutralCount = isShared ? (state.sharedResults.n || 0) : countNeutrals();
  const intensityVal = isShared
    ? (state.sharedResults.i || 0)
    : (state.scoringMode === 'rate' ? rateIntensity() : 0);
  const resultMode = isShared
    ? state.sharedResults.rm
    : classifyResult(neutralCount, totalAnswered);

  const ranked = keys.slice().sort((a, b) => scores[b] - scores[a]);
  const winnerKey = ranked[0];
  const winner = types[winnerKey];
  const winnerPct = scores[winnerKey];
  const maxScore = Math.max(...Object.values(scores), 1);

  const instrumentName = state.quiz === 'women' ? 'The Four Mothers' : 'The Four Fathers';

  const isRate = state.scoringMode === 'rate';
  const noMatchSub = isRate
    ? `Average rating across all options was ${intensityVal.toFixed(2)} of 3`
    : `${neutralCount} of ${totalAnswered} items did not align with any pattern`;
  const matchSub = isRate
    ? 'Match share <span class="big">' + winnerPct + '%</span> &middot; of all rating points'
    : 'Match score <span class="big">' + winnerPct + '%</span> &middot; of items that aligned with any pattern';

  const headline = (() => {
    if (resultMode === 'no-match') {
      const title = state.mode === 'self'
        ? "{I} did not recognize {myself} in these patterns"
        : "What {I} describe does not fit these patterns";
      return `
        <div class="results-headline no-match">
          <div class="results-kicker">${isShared ? 'Shared result · no strong match' : 'No strong match'}</div>
          <h1 class="results-title">${resolvePronouns(title, isShared ? 'proxy' : state.mode)}</h1>
          <div class="results-pct">${noMatchSub}</div>
        </div>
      `;
    }
    let kicker;
    if (isShared) {
      kicker = resultMode === 'tentative' ? 'Shared result · tentatively closest to' : 'Shared result · closest to';
    } else if (resultMode === 'tentative') {
      kicker = state.mode === 'self' ? 'Tentatively closest to' : 'What you describe is tentatively closest to';
    } else {
      kicker = state.mode === 'self' ? 'You are closest to' : 'What you describe is closest to';
    }
    return `
      <div class="results-headline">
        <div class="results-kicker">${kicker}</div>
        <h1 class="results-title">The ${formatName(winner.name)}</h1>
        <div class="results-pct">${matchSub}</div>
      </div>
    `;
  })();

  const profileSection = resultMode === 'no-match' ? '' : `
    <div class="profile-card">
      <div class="label">Profile</div>
      <h3>The ${winner.name}</h3>
      <p>${winner.profile}</p>
      <div class="traits">
        DOMINANT AFFECT &middot; ${winner.affect.toUpperCase()}<br>
        TRAITS &middot; ${winner.traits.toUpperCase()}
      </div>
    </div>

    <div class="partner-section">
      <div class="label">The corresponding figure</div>
      <h4>${formatName(winner.partnerTitle)}</h4>
      <p>${winner.partnerProfile}</p>
    </div>
  `;

  const neutralNote = (!isRate && resultMode !== 'no-match' && neutralCount > 0) ? `
    <p class="neutral-note">${neutralCount} of ${totalAnswered} items did not align with any of the four patterns.</p>
  ` : '';

  const actions = isShared ? `
    <div class="actions">
      <button class="btn btn-secondary" onclick="takeYourself()">Take it yourself</button>
      <button class="btn" onclick="goHome()">Other instrument</button>
    </div>
  ` : `
    <div class="actions">
      <button class="btn btn-secondary" onclick="retakeQuiz()">Retake</button>
      <button class="btn btn-secondary" onclick="shareResults()">Share</button>
      <button class="btn" onclick="goHome()">Other instrument</button>
    </div>
  `;

  $app.innerHTML = `
    <div class="masthead">
      <span>Results</span>
      <span class="center">${instrumentName}</span>
      <span>${state.mode === 'self' ? 'About me' : 'About someone'}</span>
    </div>

    ${headline}

    <div class="chart-container">
      ${renderChart(scores)}
    </div>

    ${neutralNote}

    ${profileSection}

    <div class="breakdown">
      <h4>Full distribution</h4>
      ${ranked.map(k => `
        <div class="breakdown-row">
          <span class="br-name">${formatName(types[k].name)}</span>
          <div class="br-bar"><div class="br-fill" style="width:${(scores[k] / maxScore * 100).toFixed(1)}%"></div></div>
          <span class="br-pct">${scores[k]}%</span>
        </div>
      `).join('')}
    </div>

    ${actions}
  `;
}

function encodeShareUrl() {
  const scores = computeScores();
  const data = {
    q: state.quiz,
    m: state.mode,
    sm: state.scoringMode,
    s: scores,
    rm: classifyResult(countNeutrals(), state.answers.length)
  };
  if (state.scoringMode === 'rate') {
    data.i = +rateIntensity().toFixed(2);
  } else {
    data.n = countNeutrals();
    data.t = state.answers.length;
  }
  const json = JSON.stringify(data);
  const b64 = btoa(json).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  const base = window.location.origin + window.location.pathname;
  return `${base}?share=${b64}`;
}

function showToast(message) {
  const existing = document.querySelector('.share-toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'share-toast';
  el.textContent = message;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2400);
}

window.shareResults = async function() {
  const url = encodeShareUrl();
  const types = TYPES[state.quiz];
  const keys = TYPE_ORDER[state.quiz];
  const scores = computeScores();
  const winnerKey = keys.slice().sort((a, b) => scores[b] - scores[a])[0];
  const winnerName = types[winnerKey].name;
  const shareData = {
    title: 'Four Mothers, Four Fathers',
    text: `Closest to The ${winnerName} (${scores[winnerKey]}%)`,
    url
  };
  if (navigator.share) {
    try { await navigator.share(shareData); return; }
    catch (e) { if (e && e.name === 'AbortError') return; }
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    try { await navigator.clipboard.writeText(url); showToast('Link copied'); return; }
    catch (e) { /* fall through */ }
  }
  // Last-resort fallback: render the URL into the page for manual copy
  const el = document.createElement('div');
  el.className = 'share-fallback';
  el.textContent = url;
  document.querySelector('.actions').after(el);
  showToast('Copy the link below');
};

window.takeYourself = function() {
  state.sharedResults = null;
  state.view = 'home';
  state.quiz = null;
  state.qIndex = 0;
  state.answers = [];
  state.pending = null;
  try { history.replaceState(null, '', window.location.pathname); } catch (e) {}
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

function formatName(name) {
  if (name.includes('-')) {
    const parts = name.split('-');
    return `${parts[0]}-<em>${parts[1]}</em>`;
  }
  return name;
}

window.retakeQuiz = function() {
  state.qIndex = 0;
  state.answers = [];
  state.pending = null;
  state.view = 'quiz';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.goHome = function() {
  state.view = 'home';
  state.quiz = null;
  state.qIndex = 0;
  state.answers = [];
  state.pending = null;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

render();
</script>
</body>
</html>
