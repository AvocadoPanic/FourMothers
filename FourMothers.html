<script>
/* ============================================================
   TYPES — with pop culture references in profiles
   ============================================================ */
const TYPES = {
  women: {
    waif: {
      name: 'Waif',
      pairKey: 'frog',
      affect: 'Helplessness',
      traits: 'Passive · permissive · self-depriving · fantasy-prone · fragile',
      profile: "The Waif feels cursed. She refuses the gift, deflects the compliment, apologizes for taking up space, and somehow makes you feel terrible for noticing. Cinderella by the hearth. Fantine on her deathbed. Marilyn Monroe in her own retelling of her childhood. Her dominant feeling is helplessness, and her favorite fantasy is rescue. She chooses men who cannot save her, then suffers audibly that she has not been saved.",
      partnerTitle: "The Frog-Prince",
      partnerProfile: "She marries a man defined by what he cannot give. Depressed, addicted, drifting, or simply absent in the room. They live a shared fantasy that the other will fix everything. It does not work out."
    },
    hermit: {
      name: 'Hermit',
      pairKey: 'huntsman',
      affect: 'Fear',
      traits: 'Reclusive · possessive · jealous · suspicious · overcontrolling · cold',
      profile: "The Hermit is afraid all the time. She believes the world is plotting against her and gathers evidence to confirm it. Norma Desmond in her sealed mansion. Mrs. Danvers in her museum to the dead. Sylvia Plath in her journals. The Hermit punishes by withdrawal: stony silence, locked doors, refusal to be reached. She does not forgive. She only forgets, eventually, that you exist.",
      partnerTitle: "The Huntsman",
      partnerProfile: "She marries the principled, hardworking, slightly absent man who keeps the household together by sheer force of duty. He works late. He does not contradict her. He tells the children there is nothing wrong with their mother, and he means it."
    },
    queen: {
      name: 'Queen',
      pairKey: 'king',
      affect: 'Emptiness',
      traits: 'Mirror-hungry · entitled · intrusive · extravagant · hysterical · vindictive',
      profile: "The Queen is empty, and she fills the emptiness with attention. She must be looked at, admired, and obeyed. Joan Crawford writing her own legend. Mary Todd Lincoln in mourning regalia. Cersei Lannister. Lucille Bluth. She is extravagant in display and stingy in private. She demands loyalty and discards people who fail to provide enough of it. She is generous on her own terms and forgives nothing.",
      partnerTitle: "The King",
      partnerProfile: "She marries the man whose self-worth depends on being seen as important. Don Draper. Logan Roy. The husband with his awards on the study wall. They feed each other, mostly. The children are decoration."
    },
    witch: {
      name: 'Witch',
      pairKey: 'fisherman',
      affect: 'Annihilating rage',
      traits: 'Sadistic · domineering · denigrating · destructive · boundary-violating · vengeful',
      profile: "The Witch is angry. Not in flashes; constantly, just under the surface. Livia Soprano with her serene smile and her quiet poisonings. Margaret White in Carrie. Joan Crawford with the wire hangers. She is sadistic in small ways and large. She destroys what is loved, withholds what is needed, and divides people into factions she controls. She targets the vulnerable. Her hostility is fear in a heavier coat.",
      partnerTitle: "The Fisherman",
      partnerProfile: "She marries the husband she can dominate. He mutters, he submits, and he sometimes joins her in punishing the children. He cannot see her clearly. He may have had a mother like her, or no mother at all."
    }
  },
  men: {
    frog: {
      name: 'Frog-Prince',
      pairKey: 'waif',
      affect: 'Emotional constriction',
      traits: 'Underdog · numbing · unreliable · depressive or violent · unfaithful',
      profile: "The Frog-Prince is the underdog. He is depressed, or numbed, or drifting somewhere on his own private detour. Walter White in the bad early years, before the chemistry. Don Birnam in The Lost Weekend. Some Frog-Princes are loveable. Some are violent. Many are simply absent. He does not remember much of his childhood. He defends against being left by being unavailable first.",
      partnerTitle: "The Waif",
      partnerProfile: "He pairs with the woman who feels cursed and chooses men who confirm it. They share a fantasy that the other will save them. He does not change."
    },
    huntsman: {
      name: 'Huntsman',
      pairKey: 'hermit',
      affect: 'Repressed emotion under duty',
      traits: 'Good-hearted · loyal · principled · avoidant · protective of wife not children',
      profile: "The Huntsman is the good man. Atticus Finch. Ned Stark. He is loyal, principled, hardworking, and slightly distant. He keeps the marriage going by avoiding anything that would force him to admit it should not be kept going. He works two jobs. He retreats to the workshop. He tells the children their mother is fine. He believes it, mostly.",
      partnerTitle: "The Hermit",
      partnerProfile: "He pairs with the frightened, jealous, withdrawing wife. He pities her, protects her, and fails to see how his quiet steadiness leaves the children alone with her fear."
    },
    king: {
      name: 'King',
      pairKey: 'queen',
      affect: 'Fragile grandiosity',
      traits: 'Entitled · attention-seeking · withdrawing · status-preoccupied · demanding',
      profile: "The King must be seen as important. Don Draper. Logan Roy. Tony Stark before he learned anything. He is grandiose, demanding, and easily wounded. He complains to the manager. He embellishes the resume. When the family becomes inconvenient he retreats to his study. When the children create difficulty he is briefly disappointed and then gone again.",
      partnerTitle: "The Queen",
      partnerProfile: "He pairs with the woman who must be looked at, admired, and obeyed. They are mutual mirrors. The kingdom they construct is for two. The children are accessories who must perform on cue."
    },
    fisherman: {
      name: 'Fisherman',
      pairKey: 'witch',
      affect: 'Will relinquished to wife',
      traits: 'Submissive · low self-esteem · passive-aggressive · blind to pathology · cannot protect',
      profile: "The Fisherman is the husband nobody quite explains. He mutters. He submits. He calls the police on his daughter when his wife loses it. He sees himself as a victim of his wife's temper, never as her partner in what she does. He may have had a sadistic mother himself, and learned that this is what marriage looks like. He cannot defend his children because he cannot see them as separate from her.",
      partnerTitle: "The Witch",
      partnerProfile: "He pairs with the angry, dominating wife. She rules. He obeys. The children are caught between them with no one to turn to."
    }
  }
};

const TYPE_ORDER = {
  women: Object.keys(TYPES.women),
  men: Object.keys(TYPES.men)
};

const VERSION = 'v2.1';

/* ============================================================
   PRONOUN RESOLUTION
   Single-pass dispatch — order-independent so {you} can't shadow {youO}.
   ============================================================ */
const PRONOUNS = {
  self: { I: 'I', me: 'me', my: 'my', My: 'My', myself: 'myself',
          am: 'am', was: 'was', youO: 'you', you: 'you',
          your: 'your', Your: 'Your', yourself: 'yourself' },
  proxy: { I: 'They', me: 'them', my: 'their', My: 'Their', myself: 'themselves',
           am: 'are', was: 'were', youO: 'them', you: 'they',
           your: 'their', Your: 'Their', yourself: 'themselves' }
};

function resolvePronouns(text, mode) {
  const table = PRONOUNS[mode] || PRONOUNS.self;
  return text.replace(/\{(\w+)\}/g, (_, key) =>
    Object.prototype.hasOwnProperty.call(table, key) ? table[key] : `{${key}}`
  );
}

/* ============================================================
   QUESTIONS — WOMEN
   ============================================================ */
const Q_WOMEN = [
  { q: "The emotion that runs underneath everything is:",
    opts: [
      { t: "Helplessness. {I} expect to be hurt and rarely fight it.", w: { waif: 3 } },
      { t: "Fear. {I} {am} vigilant even when nothing is happening.", w: { hermit: 3 } },
      { t: "Emptiness. Nothing fills it for long.", w: { queen: 3 } },
      { t: "Rage that {I} keep mostly out of sight.", w: { witch: 3 } }
    ]},
  { q: "When criticized, the first response is to:",
    opts: [
      { t: "Cry, apologize, agree that {I} {am} terrible.", w: { waif: 3 } },
      { t: "Withdraw into silence and refuse to acknowledge it.", w: { hermit: 3 } },
      { t: "Reframe {myself} as the wronged party.", w: { queen: 3 } },
      { t: "Discredit and attack the source.", w: { witch: 3 } }
    ]},

const state = {
  view: 'home',

  quiz: null,

const $app = document.getElementById('app');

function render() {
  $app.innerHTML = '';
  $app.classList.remove('fade-in');
  void $app.offsetWidth;
  $app.classList.add('fade-in');

  if (state.view === 'home') return renderHome();
  if (state.view === 'quiz') return renderQuiz();
  if (state.view === 'results') return renderResults();
}

window.setMode = function(mode) {
  state.mode = mode;
  render();
};

window.startQuiz = function(which) {
  state.view = 'quiz';
  state.quiz = which;
  state.qIndex = 0;
  state.answers = [];
  render();
};

/* ---------- QUIZ ---------- */
function getQuestions() {
  return state.quiz === 'women' ? Q_WOMEN : Q_MEN;
}

function renderQuiz() {
  const questions = getQuestions();
  const total = questions.length;
  const i = state.qIndex;
  const q = questions[i];
  const pct = (i / total) * 100;
  const letters = ['A', 'B', 'C', 'D'];
  const instrumentName = state.quiz === 'women' ? 'The Four Mothers' : 'The Four Fathers';
  const modeTag = state.mode === 'self' ? 'About me' : 'About someone in my life';

  $app.innerHTML = `
    <div class="masthead">
      <span>${instrumentName}</span>
      <span class="center">${modeTag}</span>
      <span>${String(i+1).padStart(2,'0')} / ${total}</span>
    </div>
    <div class="progress-row">
      <span>Item ${String(i+1).padStart(2,'0')}</span>
      <span class="right">${i+1} of ${total}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>

    <div class="q-number">Q.${String(i+1).padStart(2,'0')}</div>
    <h2 class="question-text">${resolvePronouns(q.q, state.mode)}</h2>
    <div class="options-list">
      ${q.opts.map((o, idx) => `
        <button class="option-btn" onclick="answer(${idx})">
          <span class="option-letter">${letters[idx]}.</span>
          <span>${resolvePronouns(o.t, state.mode)}</span>
        </button>
      `).join('')}
    </div>
    <button class="back-link" onclick="goBack()">${i === 0 ? '\u2190 Back to menu' : '\u2190 Previous item'}</button>
  `;
}

window.answer = function(optIdx) {
  const q = getQuestions()[state.qIndex];
  state.answers[state.qIndex] = q.opts[optIdx].w;
  state.qIndex++;
  if (state.qIndex >= getQuestions().length) {
    state.view = 'results';
  }
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.goBack = function() {
  if (state.qIndex === 0) {
    state.view = 'home';
    state.quiz = null;
    state.answers = [];
  } else {
    state.qIndex--;
    state.answers.pop();
  }
  render();
};

/* ---------- SCORING ----------
   Each option weights exactly one type, so every answer adds 3 to one
   type's earned total. Reporting as share-of-total makes the headline
   number reflect relative dominance instead of a per-axis ceiling that
   only the most consistent respondent ever approaches. */
function computeScores() {
  const keys = TYPE_ORDER[state.quiz];

  const earned = {};
  keys.forEach(k => earned[k] = 0);
  state.answers.forEach(w => {
    Object.keys(w).forEach(k => { earned[k] = (earned[k] || 0) + w[k]; });
  });

  const total = keys.reduce((s, k) => s + earned[k], 0) || 1;
  const pct = {};
  keys.forEach(k => {
    pct[k] = Math.round((earned[k] / total) * 100);
  });
  return pct;
}

/* ---------- CHART (4-axis radar) ---------- */
function renderChart(scores) {
  const keys = TYPE_ORDER[state.quiz];
  const types = TYPES[state.quiz];
  const n = keys.length;
  const W = 520, H = 500;
  const cx = W / 2;
  const cy = H / 2;
  const R = 150;

  const summary = keys.map(k => `${types[k].name} ${scores[k]}%`).join(', ');
  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" class="chart-svg" role="img" aria-label="Score distribution across four types: ${summary}"><title>Score distribution</title>`;

  // Concentric grid
  for (let lvl = 1; lvl <= 4; lvl++) {
    const r = R * lvl / 4;
    const pts = keys.map((_, i) => {
      const a = (i / n) * Math.PI * 2 - Math.PI / 2;
      return `${(cx + Math.cos(a) * r).toFixed(2)},${(cy + Math.sin(a) * r).toFixed(2)}`;
    }).join(' ');
    svg += `<polygon points="${pts}" fill="none" stroke="#c8bda9" stroke-width="${lvl === 4 ? 1.2 : 0.6}" stroke-dasharray="${lvl < 4 ? '2,3' : 'none'}"/>`;
  }

  // Radial axes
  keys.forEach((_, i) => {
    const a = (i / n) * Math.PI * 2 - Math.PI / 2;
    const x = cx + Math.cos(a) * R;
    const y = cy + Math.sin(a) * R;
    svg += `<line x1="${cx}" y1="${cy}" x2="${x.toFixed(2)}" y2="${y.toFixed(2)}" stroke="#c8bda9" stroke-width="0.6"/>`;
  });

  // Tick labels along top axis
  for (let lvl = 1; lvl <= 3; lvl++) {
    const r = R * lvl / 4;
    svg += `<text x="${cx + 4}" y="${(cy - r + 3).toFixed(2)}" font-family="IBM Plex Mono, monospace" font-size="9" fill="#8a7e72">${lvl * 25}</text>`;
  }

  // Score polygon
  const scorePts = keys.map((k, i) => {
    const a = (i / n) * Math.PI * 2 - Math.PI / 2;
    const r = R * Math.min(1, scores[k] / 100);
    return `${(cx + Math.cos(a) * r).toFixed(2)},${(cy + Math.sin(a) * r).toFixed(2)}`;
  }).join(' ');
  svg += `<polygon points="${scorePts}" fill="rgba(122, 40, 24, 0.18)" stroke="#7a2818" stroke-width="2" stroke-linejoin="round"/>`;

  // Vertex dots
  keys.forEach((k, i) => {
    const a = (i / n) * Math.PI * 2 - Math.PI / 2;
    const r = R * Math.min(1, scores[k] / 100);
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    svg += `<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="4" fill="#7a2818" stroke="#fbf6ec" stroke-width="2"/>`;
  });

  // Percentage labels inside near each vertex
  keys.forEach((k, i) => {
    const a = (i / n) * Math.PI * 2 - Math.PI / 2;
    const lr = R * 0.6;
    const lx = cx + Math.cos(a) * lr;
    const ly = cy + Math.sin(a) * lr;
    svg += `<text x="${lx.toFixed(2)}" y="${(ly+5).toFixed(2)}" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="14" font-weight="500" fill="#1d1a16">${scores[k]}%</text>`;
  });

  // Type name labels outside vertices (no pair labels — pair is the quiet reveal below)
  keys.forEach((k, i) => {
    const a = (i / n) * Math.PI * 2 - Math.PI / 2;
    const lr = R + 32;
    const lx = cx + Math.cos(a) * lr;
    const ly = cy + Math.sin(a) * lr;
    const dy = Math.sin(a) > 0.3 ? 14 : (Math.sin(a) < -0.3 ? -4 : 5);
    svg += `<text x="${lx.toFixed(2)}" y="${(ly+dy).toFixed(2)}" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="22" font-weight="600" fill="#1d1a16">${types[k].name}</text>`;
  });

  svg += '</svg>';
  return svg;
}

/* ---------- RESULTS ---------- */
function renderResults() {
  const scores = computeScores();
  const keys = TYPE_ORDER[state.quiz];
  const types = TYPES[state.quiz];

  const ranked = keys.slice().sort((a, b) => scores[b] - scores[a]);
  const winnerKey = ranked[0];
  const winner = types[winnerKey];
  const winnerPct = scores[winnerKey];
  const maxScore = Math.max(...Object.values(scores), 1);

  const instrumentName = state.quiz === 'women' ? 'The Four Mothers' : 'The Four Fathers';
  const kicker = state.mode === 'self' ? 'You are closest to' : 'What you describe is closest to';

  $app.innerHTML = `
    <div class="masthead">
      <span>Results</span>
      <span class="center">${instrumentName}</span>
      <span>${state.mode === 'self' ? 'About me' : 'About someone'}</span>
    </div>

    <div class="results-headline">
      <div class="results-kicker">${kicker}</div>
      <h1 class="results-title">The ${formatName(winner.name)}</h1>
      <div class="results-pct">Match score <span class="big">${winnerPct}%</span></div>
    </div>

    <div class="chart-container">
      ${renderChart(scores)}
    </div>

    <div class="profile-card">
      <div class="label">Profile</div>
      <h3>The ${winner.name}</h3>
      <p>${winner.profile}</p>
      <div class="traits">
        DOMINANT AFFECT &middot; ${winner.affect.toUpperCase()}<br>
        TRAITS &middot; ${winner.traits.toUpperCase()}
      </div>
    </div>

    <div class="partner-section">
      <div class="label">The corresponding figure</div>
      <h4>${formatName(winner.partnerTitle)}</h4>
      <p>${winner.partnerProfile}</p>
    </div>

    <div class="breakdown">
      <h4>Full distribution</h4>
      ${ranked.map(k => `
        <div class="breakdown-row">
          <span class="br-name">${formatName(types[k].name)}</span>
          <div class="br-bar"><div class="br-fill" style="width:${(scores[k] / maxScore * 100).toFixed(1)}%"></div></div>
          <span class="br-pct">${scores[k]}%</span>
        </div>
      `).join('')}
    </div>

    <div class="actions">
      <button class="btn btn-secondary" onclick="retakeQuiz()">Retake</button>
      <button class="btn" onclick="goHome()">Other instrument</button>
    </div>
  `;
}

function formatName(name) {
  if (name.includes('-')) {
    const parts = name.split('-');
    return `${parts[0]}-<em>${parts[1]}</em>`;
  }
  return name;
}

window.retakeQuiz = function() {
  state.qIndex = 0;
  state.answers = [];
  state.view = 'quiz';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.goHome = function() {
  state.view = 'home';
  state.quiz = null;
  state.qIndex = 0;
  state.answers = [];
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

render();
</script>
</body>
</html>
